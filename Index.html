function Thumb({ytId,title,subject,duration,watched}){
  const [err,setErr]=useState(false);
  return(
    <div style={{position:"relative",paddingTop:"52%",borderRadius:10,overflow:"hidden",background:getColor(subject)}}>
      {!err
        ?<img src={`https://img.youtube.com/vi/${ytId}/mqdefault.jpg`} alt={title}
            style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",objectFit:"cover"}}
            onError={()=>setErr(true)}/>
        :<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,padding:12}}>
            <span style={{fontSize:40}}>{getEmoji(subject)}</span>
            <span style={{color:"rgba(255,255,255,0.9)",fontSize:13,fontWeight:600,textAlign:"center",lineHeight:1.3}}>{title}</span>
          </div>
      }
      <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.5) 0%,transparent 50%)"}}/>
      <span style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,0.85)",color:"#fff",fontSize:12,padding:"2px 7px",borderRadius:4,fontWeight:600}}>{duration}</span>
      {watched&&<span style={{position:"absolute",top:8,left:8,background:"#16a34a",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:10}}>✓ Dekha</span>}
    </div>
  );
}

function NavBar({tab,setTab}){
  const items=[
    {id:"home",icon:<IHome/>,label:"Home"},
    {id:"shorts",icon:<IShorts/>,label:"Shorts"},
    {id:"upload",icon:<IPlus/>,label:""},

    {id:"profile",icon:<IUser/>,label:"Profile"},
  ];
  return(
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:C.root,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100,maxWidth:480,margin:"0 auto"}}>
      {items.map(item=>(
        <button key={item.id} onClick={()=>setTab(item.id)}
          style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:item.id==="upload"?"8px 0":"10px 0 8px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===item.id?"#fff":C.sub,fontFamily:"inherit",position:"relative"}}>
          {item.id==="upload"
            ?<div style={{width:40,height:40,borderRadius:8,background:C.chip,display:"flex",alignItems:"center",justifyContent:"center",border:`1px solid ${C.border}`}}><IPlus/></div>
            :item.icon
          }
          {item.label&&<span style={{fontSize:10,fontWeight:tab===item.id?700:400}}>{item.label}</span>}
          {tab===item.id&&item.id!=="upload"&&<div style={{position:"absolute",top:0,left:"25%",right:"25%",height:2,background:"#fff",borderRadius:2}}/>}
        </button>
      ))}

  );
}

function App(){
  const [tab,setTab]=useState("home");
  const [subject,setSubject]=useState("all");
  const [search,setSearch]=useState("");
  const [searchMode,setSearchMode]=useState(false);
  const [video,setVideo]=useState(null);
  const [saved,setSaved]=useState([]);
  const [watched,setWatched]=useState([]);
  const [subscribed,setSubscribed]=useState([]);
  const [notes,setNotes]=useState("");
  const [minutes,setMinutes]=useState(42);
  const [streak]=useState(7);
  const [shortIdx,setShortIdx]=useState(0);
  const [focusMode,setFocusMode]=useState(false);
  const [studyTimer,setStudyTimer]=useState(0);
  const [timerRunning,setTimerRunning]=useState(false);
  const [uploadForm,setUploadForm]=useState({title:"",link:"",subject:"",level:"",lang:"Hindi",desc:""});
  const [submitted,setSubmitted]=useState(false);
  const searchRef=useRef(null);
  const timerRef=useRef(null);
  const studyTimerRef=useRef(null);

  useEffect(()=>{
    if(tab==="player") timerRef.current=setInterval(()=>setMinutes(m=>m+1),60000);
    return()=>clearInterval(timerRef.current);
  },[tab]);

  useEffect(()=>{
    if(searchMode && searchRef.current) searchRef.current.focus();
  },[searchMode]);

  useEffect(()=>{
    if(timerRunning) studyTimerRef.current=setInterval(()=>setStudyTimer(t=>t+1),1000);
    else clearInterval(studyTimerRef.current);
    return()=>clearInterval(studyTimerRef.current);
  },[timerRunning]);

  const formatTimer=(secs)=>{
    const m=Math.floor(secs/60).toString().padStart(2,"0");
    const s=(secs%60).toString().padStart(2,"0");
    return `${m}:${s}`;
  };

  const openVideo=(v)=>{
    setVideo(v); setNotes(""); setFocusMode(false); setTimerRunning(false); setStudyTimer(0);
    if(!watched.includes(v.id)) setWatched(p=>[...p,v.id]);
    setTab("player"); setSearchMode(false);
  };
  const toggleSave=id=>setSaved(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleSub=id=>setSubscribed(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const filtered=VIDEOS.filter(v=>{
    const bySub=subject==="all"||v.subject===subject;
    const byQ=!search||v.title.toLowerCase().includes(search.toLowerCase())||v.channel.toLowerCase().includes(search.toLowerCase());
    return bySub&&byQ;
  });

  const doUpload=()=>{
    if(!uploadForm.title||!uploadForm.link||!uploadForm.subject) return;
    setSubmitted(true);
    setTimeout(()=>{setSubmitted(false);setUploadForm({title:"",link:"",subject:"",level:"",lang:"Hindi",desc:""});},3000);
  };

  const rs={
    root:{background:C.root,minHeight:"100vh",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"},
    topbar:{background:C.root,borderBottom:`1px solid ${C.border}`,padding:"10px 14px",display:"flex",alignItems:"center",gap:8,position:"sticky",top:0,zIndex:50},
    logo:{display:"flex",alignItems:"center",gap:2},
    iconBtn:{background:"none",border:"none",cursor:"pointer",color:C.text,display:"flex",alignItems:"center",padding:6},
    secLabel:{fontSize:13,fontWeight:700,color:C.muted,textTransform:"uppercase",letterSpacing:0.5,margin:"16px 0 10px"},
    card:{background:C.card,borderRadius:12,overflow:"hidden"},
    bluePill:{background:"rgba(255,255,255,0.1)",color:C.text,fontSize:12,fontWeight:600,padding:"3px 9px",borderRadius:20,display:"inline-block"},
    greyPill:{background:C.chip,color:C.muted,fontSize:12,fontWeight:500,padding:"3px 9px",borderRadius:20,display:"inline-flex",alignItems:"center",gap:4},
    divider:{height:1,background:C.border,margin:"14px 0"},
    field:{background:C.chip,border:`1px solid ${C.border}`,borderRadius:10,padding:"11px 13px",fontSize:15,fontFamily:"inherit",color:C.text,outline:"none",width:"100%",boxSizing:"border-box"},
    primaryBtn:{background:C.accent,border:"none",borderRadius:12,color:"#000",padding:"15px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit",width:"100%"},
  };

  // SEARCH OVERLAY
  if(searchMode) return(
    <div style={rs.root}>
      <div style={rs.topbar}>
        <button style={rs.iconBtn} onClick={()=>setSearchMode(false)}><IBack/></button>

        {search&&<button style={{...rs.iconBtn,fontSize:18,color:C.muted}} onClick={()=>setSearch("")}>✕</button>}

      <div style={{padding:"0 16px 80px",overflowY:"auto",flex:1}}>
        <p style={rs.secLabel}>Trending Searches</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {["Trigonometry","Newton Laws","Mughal Empire","SSC Reasoning","Python","NEET Biology","Algebra"].map(t=>(
            <button key={t} style={{background:C.chip,border:`1px solid ${C.border}`,borderRadius:20,padding:"7px 14px",color:C.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{setSearch(t);setSearchMode(false);}}>🔍 {t}</button>
          ))}
        </div>
        <p style={rs.secLabel}>Subjects</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {SUBJECTS.filter(s=>s.id!=="all").map(s=>(
            <button key={s.id} style={{background:C.chip,border:`1px solid ${C.border}`,borderRadius:20,padding:"7px 14px",color:C.muted,fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>{setSubject(s.id);setSearch("");setSearchMode(false);}}>
              {s.emoji} {s.label}
            </button>
          ))}
        </div>
      </div>
    </div>
  );

  if(tab==="player"&&video) return(

      <div style={rs.topbar}>
        <button style={rs.iconBtn} onClick={()=>setTab("home")}><IBack/></button>

          </div>

            const ch=CHANNELS.find(c=>c.name===video.channel);
            if(!ch) return null;
            const isSub=subscribed.includes(ch.id);
            return(
              <div style={{...rs.card,display:"flex",alignItems:"center",gap:12,padding:"12px 14p
